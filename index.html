<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic Tac Toe</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100vh;
      overflow: hidden;
      font-family: Tahoma, Verdana, 'MS Sans Serif', sans-serif;
      font-size: 11px;
    }

    /* ── XP Bliss Desktop ── */
    body {
      background:
        linear-gradient(to bottom,
          #1a55cc 0%,
          #4b88e0 40%,
          #6db843 40%,
          #4a9020 100%
        );
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ── Particle canvas (keep for fun) ── */
    #particles { position: fixed; inset: 0; pointer-events: none; z-index: 100; }

    /* ══════════════════════════════════════
       XP Window Frame
    ══════════════════════════════════════ */
    .window {
      background: #ece9d8;
      border: 3px solid #0a246a;
      box-shadow: 3px 3px 0 rgba(0,0,0,0.5);
      width: 520px;
      position: relative;
      z-index: 1;
    }

    /* ── Title Bar ── */
    .titlebar {
      background: linear-gradient(to right, #0a246a 0%, #3a6ac4 60%, #a6b5da 100%);
      color: white;
      font: bold 12px Tahoma, sans-serif;
      padding: 4px 6px;
      display: flex;
      align-items: center;
      gap: 5px;
      user-select: none;
    }
    .titlebar-icon { font-size: 14px; line-height: 1; }
    .titlebar-text { flex: 1; text-shadow: 1px 1px 1px rgba(0,0,0,0.5); }
    .titlebar-buttons { display: flex; gap: 2px; }
    .tb-btn {
      width: 21px; height: 21px;
      background: linear-gradient(to bottom, #e0ddd4, #c0bdb4);
      border: 2px outset #ffffff;
      font-size: 9px;
      font-weight: bold;
      color: #000;
      cursor: default;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Marlett', Tahoma, sans-serif;
    }
    .tb-btn:active { border-style: inset; }
    .tb-close {
      background: linear-gradient(to bottom, #e8a0a0, #cc5555);
      color: white;
    }
    .tb-close:hover { background: linear-gradient(to bottom, #ff9999, #dd4444); }

    /* ── Menu Bar ── */
    .menubar {
      background: linear-gradient(to bottom, #ece9d8, #d4d0c8);
      border-bottom: 1px solid #aca899;
      padding: 2px 4px;
      display: flex;
      gap: 0;
    }
    .menu-item {
      padding: 2px 8px;
      cursor: default;
      color: #000;
    }
    .menu-item:hover {
      background: #316ac5;
      color: #fff;
    }

    /* ── Window Body ── */
    .window-body {
      padding: 10px;
      background: #ece9d8;
    }

    /* ══════════════════════════════════════
       3-Column Layout
    ══════════════════════════════════════ */
    .app {
      display: flex;
      align-items: stretch;
      gap: 8px;
    }

    /* ══════════════════════════════════════
       Side Panels
    ══════════════════════════════════════ */
    .panel {
      width: 116px;
      background: #d4d0c8;
      border: 2px inset #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 8px 6px;
    }
    .x-panel.active-turn {
      border-color: #316ac5;
      background: #dde8f8;
      box-shadow: inset 0 0 0 1px #316ac5;
    }
    .o-panel.active-turn {
      border-color: #316ac5;
      background: #dde8f8;
      box-shadow: inset 0 0 0 1px #316ac5;
    }

    /* Panel top: label */
    .panel-label {
      font-size: 10px;
      font-weight: bold;
      color: #000080;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 1px solid #aca899;
      width: 100%;
      text-align: center;
      padding-bottom: 4px;
    }

    /* Symbol wrap */
    .symbol-wrap {
      width: 72px; height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      border: 2px inset #aca899;
    }
    .big-symbol {
      font-size: 2.8rem;
      font-weight: 900;
      line-height: 1;
    }
    .x-panel .big-symbol { color: #000099; }
    .o-panel .big-symbol { color: #cc0000; }

    /* Score section */
    .score-wrap { text-align: center; }
    .score-number {
      font-size: 2rem;
      font-weight: 900;
      color: #000;
      line-height: 1;
    }
    .score-number.bump {
      animation: scoreBump 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes scoreBump {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.35); }
      100% { transform: scale(1); }
    }
    .score-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #666;
      font-weight: bold;
    }

    /* Turn indicator dot */
    .turn-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .x-panel .turn-dot { background: #000099; border: 1px solid #00007a; }
    .o-panel .turn-dot { background: #cc0000; border: 1px solid #aa0000; }
    .panel.active-turn .turn-dot {
      opacity: 1;
      animation: dotPulse 1.3s ease-in-out infinite;
    }
    @keyframes dotPulse {
      0%, 100% { transform: scale(1);   opacity: 0.7; }
      50%       { transform: scale(1.7); opacity: 1; }
    }

    .panel.win-flash { animation: panelFlash 0.5s ease-out; }
    @keyframes panelFlash {
      0%   { background: #d4d0c8; }
      25%  { background: #ffffa0; }
      75%  { background: #ffff60; }
      100% { background: #d4d0c8; }
    }

    /* ══════════════════════════════════════
       Center Card
    ══════════════════════════════════════ */
    .center {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 5px;
      color: #000;
    }

    h1 {
      text-align: center;
      font-size: 13px;
      font-weight: bold;
      color: #000080;
      letter-spacing: 3px;
      text-transform: uppercase;
      border-bottom: 1px solid #aca899;
      padding-bottom: 4px;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: #aca899;
    }

    /* Buttons */
    .btn-row { display: flex; gap: 4px; }
    .btn {
      flex: 1;
      padding: 5px 8px;
      background: linear-gradient(to bottom, #ece9d8, #d4d0c8);
      border: 2px outset #ffffff;
      font-family: Tahoma, sans-serif;
      font-size: 11px;
      font-weight: bold;
      color: #000;
      cursor: default;
      text-align: center;
    }
    .btn:hover  { background: linear-gradient(to bottom, #f0eee4, #dcdad0); }
    .btn:active { border-style: inset; }

    /* Mode toggle */
    .mode-buttons {
      display: flex;
      gap: 3px;
      background: #c0bdb4;
      border: 2px inset #ffffff;
      padding: 2px;
    }
    .mode-btn {
      flex: 1;
      padding: 4px 4px;
      background: linear-gradient(to bottom, #ece9d8, #d4d0c8);
      border: 2px outset #ffffff;
      font-family: Tahoma, sans-serif;
      font-size: 10px;
      font-weight: bold;
      color: #333;
      cursor: default;
    }
    .mode-btn:active { border-style: inset; }
    .mode-btn.active {
      background: linear-gradient(to bottom, #b8d0f0, #9ab8e8);
      color: #000080;
      border-style: inset;
    }

    /* Difficulty */
    #difficulty-section {
      display: flex; gap: 4px; align-items: center;
      justify-content: center; flex-wrap: wrap;
    }
    #difficulty-section span { font-size: 10px; color: #333; font-weight: bold; }
    .diff-btn {
      padding: 3px 8px;
      background: linear-gradient(to bottom, #ece9d8, #d4d0c8);
      border: 2px outset #ffffff;
      font-family: Tahoma, sans-serif;
      font-size: 10px;
      font-weight: bold;
      color: #333;
      cursor: default;
    }
    .diff-btn:active { border-style: inset; }
    .diff-btn.active {
      background: linear-gradient(to bottom, #b8d0f0, #9ab8e8);
      color: #000080;
      border-style: inset;
    }

    /* Status bar */
    .status {
      font-size: 11px;
      font-weight: bold;
      text-align: center;
      color: #333;
      min-height: 1.4em;
      background: #d4d0c8;
      border: 2px inset #ffffff;
      padding: 3px 5px;
    }
    .status.win  { color: #006600; background: #d4f0d4; }
    .status.draw { color: #884400; background: #f8ecc0; }

    /* Draws row */
    .draws-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border-top: 1px solid #aca899;
      padding-top: 4px;
    }
    .draws-label { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: #666; font-weight: bold; }
    .draws-count { font-size: 1rem; font-weight: 900; color: #884400; }

    /* ══════════════════════════════════════
       Board
    ══════════════════════════════════════ */
    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
      width: 100%;
      background: #aca899;
      border: 2px inset #ffffff;
      padding: 4px;
    }
    .cell {
      aspect-ratio: 1;
      background: #ffffff;
      border: 2px inset #aca899;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      font-weight: 900;
      cursor: default;
      user-select: none;
      position: relative;
      overflow: hidden;
      font-family: 'Arial Black', Tahoma, sans-serif;
    }
    .cell:hover:not(.taken) {
      background: #e8f0ff;
      border-color: #316ac5;
    }
    .cell.taken { cursor: default; }
    .cell.x { color: #000099; }
    .cell.o { color: #cc0000; }

    .cell.win-cell {
      background: #ffffa0;
      border-color: #ccaa00;
    }
    .cell.win-cell.x,
    .cell.win-cell.o { color: #000; }

    /* Ripple ring (kept) */
    .ripple-ring {
      position: absolute;
      width: 12px; height: 12px;
      border-radius: 50%;
      transform: translate(-50%, -50%) scale(0);
      animation: rippleOut 0.55s ease-out forwards;
      pointer-events: none;
    }
    .x .ripple-ring { background: rgba(0, 0, 153, 0.25); }
    .o .ripple-ring { background: rgba(204, 0, 0, 0.25); }
    @keyframes rippleOut {
      to { transform: translate(-50%, -50%) scale(14); opacity: 0; }
    }

    /* Cell pop */
    .cell.pop { animation: cellPop 0.22s cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes cellPop {
      0%   { transform: scale(0.45); opacity: 0.4; }
      100% { transform: scale(1);    opacity: 1; }
    }

    .cell.win-cell { animation: winCellAnim 0.3s ease-out forwards; }
    @keyframes winCellAnim {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    /* Board shake on draw */
    .board.shake { animation: boardShake 0.42s ease-in-out; }
    @keyframes boardShake {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-5px); }
      40%     { transform: translateX(5px); }
      60%     { transform: translateX(-3px); }
      80%     { transform: translateX(3px); }
    }

    /* ── XP Taskbar (decorative) ── */
    .taskbar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 30px;
      background: linear-gradient(to bottom, #245edb, #1a42aa);
      border-top: 2px solid #4a7de0;
      display: flex;
      align-items: center;
      padding: 0 4px;
      gap: 4px;
      z-index: 200;
    }
    .start-btn {
      background: linear-gradient(to bottom, #5da832, #3d8022);
      border: 2px outset #a0d060;
      border-radius: 0 12px 12px 0;
      color: white;
      font: bold 11px Tahoma, sans-serif;
      padding: 2px 10px 2px 6px;
      cursor: default;
      display: flex;
      align-items: center;
      gap: 4px;
      height: 24px;
    }
    .start-btn:active { border-style: inset; }
    .taskbar-time {
      margin-left: auto;
      background: #1a42aa;
      border: 1px inset #3a6ac4;
      color: white;
      font: 11px Tahoma, sans-serif;
      padding: 2px 8px;
      height: 24px;
      display: flex;
      align-items: center;
    }
    .taskbar-tray {
      display: flex;
      align-items: center;
      gap: 2px;
      font-size: 14px;
    }
  </style>
</head>
<body>

<canvas id="particles"></canvas>

<!-- XP Window -->
<div class="window">
  <div class="titlebar">
    <span class="titlebar-icon">🎮</span>
    <span class="titlebar-text">Tic Tac Toe</span>
    <div class="titlebar-buttons">
      <button class="tb-btn tb-min" onclick="void(0)">_</button>
      <button class="tb-btn tb-max" onclick="void(0)">□</button>
      <button class="tb-btn tb-close" onclick="void(0)">✕</button>
    </div>
  </div>
  <div class="menubar">
    <span class="menu-item">Game</span>
    <span class="menu-item">Help</span>
  </div>
  <div class="window-body">
    <div class="app">

      <!-- X Side Panel -->
      <div class="panel x-panel active-turn" id="panel-x">
        <div class="panel-label" id="label-x">You</div>
        <div class="symbol-wrap">
          <div class="big-symbol">X</div>
        </div>
        <div class="score-wrap">
          <div class="score-number" id="score-x">0</div>
          <div class="score-label">Wins</div>
        </div>
        <div class="turn-dot"></div>
      </div>

      <!-- Center -->
      <div class="center">
        <div class="btn-row">
          <button class="btn" onclick="resetGame()">New Game</button>
          <button class="btn" onclick="resetScore()">Reset Score</button>
        </div>

        <h1>TIC&thinsp;TAC&thinsp;TOE</h1>

        <div class="mode-buttons">
          <button class="mode-btn active" id="btn-vs-cpu"   onclick="setMode('cpu')">vs Computer</button>
          <button class="mode-btn"        id="btn-vs-local" onclick="setMode('local')">2 Players</button>
        </div>

        <div id="difficulty-section">
          <span>Difficulty:</span>
          <button class="diff-btn"        onclick="setDiff('easy')">Easy</button>
          <button class="diff-btn active" onclick="setDiff('medium')">Medium</button>
          <button class="diff-btn"        onclick="setDiff('hard')">Hard</button>
        </div>

        <div class="divider"></div>

        <div class="status" id="status">Your turn (X)</div>

        <div class="board" id="board">
          <div class="cell" onclick="handleClick(0)"></div>
          <div class="cell" onclick="handleClick(1)"></div>
          <div class="cell" onclick="handleClick(2)"></div>
          <div class="cell" onclick="handleClick(3)"></div>
          <div class="cell" onclick="handleClick(4)"></div>
          <div class="cell" onclick="handleClick(5)"></div>
          <div class="cell" onclick="handleClick(6)"></div>
          <div class="cell" onclick="handleClick(7)"></div>
          <div class="cell" onclick="handleClick(8)"></div>
        </div>

        <div class="draws-row">
          <span class="draws-label">Draws</span>
          <span class="draws-count" id="score-tie">0</span>
        </div>
      </div>

      <!-- O Side Panel -->
      <div class="panel o-panel" id="panel-o">
        <div class="panel-label" id="label-o">CPU</div>
        <div class="symbol-wrap">
          <div class="big-symbol">O</div>
        </div>
        <div class="score-wrap">
          <div class="score-number" id="score-o">0</div>
          <div class="score-label">Wins</div>
        </div>
        <div class="turn-dot"></div>
      </div>

    </div>
  </div>
</div>

<!-- Decorative XP Taskbar -->
<div class="taskbar">
  <button class="start-btn">⊞ start</button>
  <div class="taskbar-time" id="taskbar-time">12:00 PM</div>
</div>

<script>
// ── Particles ───────────────────────────────────────────────────────────────
const canvas = document.getElementById('particles');
const ctx    = canvas.getContext('2d');
let   parts  = [];

function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function burst(x, y, color, n = 18) {
  for (let i = 0; i < n; i++) {
    const angle = (Math.PI * 2 * i) / n + Math.random() * 0.6;
    const spd   = 2 + Math.random() * 4.5;
    parts.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd - 1,
      r: 2.5 + Math.random() * 3.5,
      alpha: 1,
      color,
      decay: 0.02 + Math.random() * 0.015
    });
  }
}

(function tick() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  parts = parts.filter(p => p.alpha > 0.02);
  for (const p of parts) {
    p.x += p.vx; p.y += p.vy; p.vy += 0.1;
    p.alpha -= p.decay; p.r *= 0.988;
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  requestAnimationFrame(tick);
})();

function cellCenter(i) {
  const r = getCells()[i].getBoundingClientRect();
  return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
}

// ── Taskbar clock ────────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  let h = now.getHours(), m = now.getMinutes();
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  document.getElementById('taskbar-time').textContent =
    `${h}:${String(m).padStart(2,'0')} ${ampm}`;
}
updateClock();
setInterval(updateClock, 10000);

// ── Game state ───────────────────────────────────────────────────────────────
let board      = Array(9).fill(null);
let current    = 'X';
let gameOver   = false;
let mode       = 'cpu';
let difficulty = 'medium';
let scores     = { X: 0, O: 0, tie: 0 };

const WINS   = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
const XCOL   = '#3333cc';
const OCOL   = '#dd2222';
const WINCOL = '#aacc00';

// ── Mode / Difficulty ────────────────────────────────────────────────────────
function setMode(m) {
  mode = m;
  document.getElementById('btn-vs-cpu').classList.toggle('active',   m === 'cpu');
  document.getElementById('btn-vs-local').classList.toggle('active', m === 'local');
  document.getElementById('difficulty-section').style.display = m === 'cpu' ? 'flex' : 'none';
  document.getElementById('label-o').textContent = m === 'cpu' ? 'CPU'      : 'Player 2';
  document.getElementById('label-x').textContent = m === 'cpu' ? 'You'      : 'Player 1';
  resetGame();
}

function setDiff(d) {
  difficulty = d;
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  resetGame();
}

// ── Click ────────────────────────────────────────────────────────────────────
function handleClick(i) {
  if (gameOver || board[i]) return;
  if (mode === 'cpu' && current === 'O') return;
  placeMove(i, current);
  if (!gameOver && mode === 'cpu' && current === 'O') setTimeout(cpuMove, 380);
}

function placeMove(i, player) {
  board[i] = player;
  const cell = getCells()[i];

  // Ripple ring
  const ring = document.createElement('div');
  ring.className = 'ripple-ring';
  ring.style.cssText = `left:50%; top:50%; background:${player==='X'?'rgba(0,0,153,0.25)':'rgba(204,0,0,0.25)'};`;
  cell.appendChild(ring);
  setTimeout(() => ring.remove(), 600);

  cell.textContent = player;
  cell.classList.add(player.toLowerCase(), 'taken');
  cell.classList.remove('pop');
  void cell.offsetWidth;
  cell.classList.add('pop');

  // Small burst
  const { x, y } = cellCenter(i);
  burst(x, y, player === 'X' ? XCOL : OCOL, 12);

  const winLine = checkWin(board);
  if (winLine) {
    endGame(player, winLine);
  } else if (board.every(Boolean)) {
    endGame(null);
  } else {
    current = current === 'X' ? 'O' : 'X';
    updateStatus();
    updateTurnHighlight();
  }
}

// ── CPU ──────────────────────────────────────────────────────────────────────
function cpuMove() {
  if (gameOver) return;
  const m = getBestMove();
  if (m !== -1) placeMove(m, 'O');
}

function getBestMove() {
  const empty = board.map((v,i) => v===null ? i : -1).filter(i => i>=0);
  if (!empty.length) return -1;

  if (difficulty === 'easy') {
    if (Math.random() < 0.7) return empty[Math.floor(Math.random()*empty.length)];
  }
  if (difficulty === 'medium') {
    const w = findImmediate('O'); if (w !== -1) return w;
    const b = findImmediate('X'); if (b !== -1) return b;
    if (Math.random() < 0.5) return empty[Math.floor(Math.random()*empty.length)];
  }

  let best = -Infinity, bestMove = -1;
  for (const i of empty) {
    board[i] = 'O';
    const sc = minimax(board, 0, false);
    board[i] = null;
    if (sc > best) { best = sc; bestMove = i; }
  }
  return bestMove;
}

function findImmediate(player) {
  for (const i of board.map((v,i)=>v===null?i:-1).filter(i=>i>=0)) {
    board[i] = player;
    const w = checkWin(board);
    board[i] = null;
    if (w) return i;
  }
  return -1;
}

function minimax(b, depth, isMax) {
  const w = checkWin(b);
  if (w) return isMax ? -10+depth : 10-depth;
  if (b.every(Boolean)) return 0;
  const empty = b.map((v,i)=>v===null?i:-1).filter(i=>i>=0);
  if (isMax) {
    let best = -Infinity;
    for (const i of empty) { b[i]='O'; best=Math.max(best,minimax(b,depth+1,false)); b[i]=null; }
    return best;
  } else {
    let best = Infinity;
    for (const i of empty) { b[i]='X'; best=Math.min(best,minimax(b,depth+1,true)); b[i]=null; }
    return best;
  }
}

// ── Win check ────────────────────────────────────────────────────────────────
function checkWin(b) {
  for (const line of WINS) {
    const [a,c,d] = line;
    if (b[a] && b[a]===b[c] && b[a]===b[d]) return line;
  }
  return null;
}

// ── End game ─────────────────────────────────────────────────────────────────
function endGame(winner, winLine) {
  gameOver = true;
  setTurnHighlight(null);

  if (winner) {
    scores[winner]++;
    const numEl = document.getElementById('score-' + winner.toLowerCase());
    numEl.textContent = scores[winner];
    numEl.classList.remove('bump');
    void numEl.offsetWidth;
    numEl.classList.add('bump');

    winLine.forEach((i, idx) => {
      setTimeout(() => {
        getCells()[i].classList.add('win-cell');
        const { x, y } = cellCenter(i);
        burst(x, y, WINCOL, 28);
      }, idx * 80);
    });

    const panelId = winner === 'X' ? 'panel-x' : 'panel-o';
    const panel   = document.getElementById(panelId);
    panel.classList.remove('win-flash');
    void panel.offsetWidth;
    panel.classList.add('win-flash');

    const name = mode === 'cpu'
      ? (winner === 'X' ? 'You win!' : 'CPU wins!')
      : `Player ${winner === 'X' ? '1' : '2'} wins!`;
    const el = document.getElementById('status');
    el.textContent = name;
    el.className = 'status win';
  } else {
    scores.tie++;
    document.getElementById('score-tie').textContent = scores.tie;
    const boardEl = document.getElementById('board');
    boardEl.classList.remove('shake');
    void boardEl.offsetWidth;
    boardEl.classList.add('shake');
    getCells().forEach((_, i) => {
      const { x, y } = cellCenter(i);
      burst(x, y, '#ccaa00', 5);
    });
    const el = document.getElementById('status');
    el.textContent = "It's a draw!";
    el.className = 'status draw';
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function updateStatus() {
  const el = document.getElementById('status');
  el.className = 'status';
  if (mode === 'cpu') {
    el.textContent = current === 'X' ? 'Your turn (X)' : 'CPU is thinking…';
  } else {
    el.textContent = `Player ${current==='X'?'1':'2'}'s turn (${current})`;
  }
}

function setTurnHighlight(player) {
  document.getElementById('panel-x').classList.toggle('active-turn', player === 'X');
  document.getElementById('panel-o').classList.toggle('active-turn', player === 'O');
}

function updateTurnHighlight() { setTurnHighlight(current); }
function getCells() { return document.querySelectorAll('.cell'); }

// ── Reset ─────────────────────────────────────────────────────────────────────
function resetGame() {
  board    = Array(9).fill(null);
  current  = 'X';
  gameOver = false;
  getCells().forEach(c => { c.textContent = ''; c.className = 'cell'; });
  document.getElementById('board').classList.remove('shake');
  setTurnHighlight('X');
  const el = document.getElementById('status');
  el.textContent = mode === 'cpu' ? 'Your turn (X)' : "Player 1's turn (X)";
  el.className = 'status';
}

function resetScore() {
  scores = { X: 0, O: 0, tie: 0 };
  ['x','o','tie'].forEach(k => document.getElementById('score-'+k).textContent = 0);
  resetGame();
}

// ── Init ──────────────────────────────────────────────────────────────────────
setMode('cpu');
</script>
